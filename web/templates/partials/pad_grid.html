{{define "pad_grid.html"}}
<div class="pad-grid">
    {{range .Pads}}
    <button class="pad-btn {{if .Selected}}selected{{end}} {{if .HasSample}}has-sample{{end}}"
            hx-get="/pad/{{.Index}}"
            hx-target="#pad-params"
            onclick="AudioPlayer.playAllPadLayers({{.Index}}, {{.LayerCount}})"
            title="{{.Name}}">
        <span class="pad-number">{{.Display}}</span>
        {{if .HasSample}}<span class="pad-name">{{.Name}}</span>{{end}}
        {{if gt .LayerCount 1}}<span class="pad-layers">{{.LayerCount}}L</span>{{end}}
    </button>
    {{end}}
</div>
{{end}}
