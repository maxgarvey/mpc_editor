<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPC Editor</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
    <header class="app-header">
        <h1><span class="title-mpc">MPC</span> <span class="title-editor">Editor</span></h1>
        <nav class="toolbar">
            <button hx-post="/program/new" hx-confirm="Create new program? Unsaved changes will be lost.">New</button>
            <form hx-post="/program/open" hx-target="body" class="inline-form">
                <input type="text" name="path" placeholder="Path to .pgm file" class="path-input" id="open-pgm-path" value="{{.Session.Prefs.LastPGMPath}}">
                <button type="button" class="btn-sm" onclick="openBrowser('open-pgm', 'open-pgm-path')">Browse</button>
                <button type="submit">Open</button>
            </form>
            <form hx-post="/program/save" class="inline-form">
                <input type="text" name="path" placeholder="Save path (leave empty for current)" class="path-input" id="save-pgm-path" value="{{.Session.FilePath}}">
                <button type="button" class="btn-sm" onclick="openBrowser('save-pgm', 'save-pgm-path')">Browse</button>
                <button type="submit">Save</button>
            </form>
            <a href="/slicer" class="toolbar-link">Slicer</a>
            <a href="/batch" class="toolbar-link">Batch</a>
        </nav>
        <div class="file-info">
            {{if .Session.FilePath}}{{.Session.FilePath}} | {{end}}Workspace: {{.Session.WorkspacePath}}
        </div>
        <div class="edit-toolbar">
            <span class="toolbar-label">Edit:</span>
            <button hx-post="/edit/remove-all-samples" hx-confirm="Remove all samples from all pads?" class="btn-sm">Remove All Samples</button>
            <button hx-post="/edit/chromatic-layout" class="btn-sm">Chromatic Layout</button>
            <button hx-post="/edit/copy-settings-to-all" hx-confirm="Copy selected pad's settings to all pads?" class="btn-sm">Copy Settings to All</button>
            <span class="toolbar-separator">|</span>
            <span class="toolbar-label">Profile:</span>
            <form hx-post="/edit/profile" class="inline-form">
                <select name="profile" hx-trigger="change" hx-post="/edit/profile">
                    <option value="MPC1000" {{if eq .Session.Profile.Name "MPC1000"}}selected{{end}}>MPC1000</option>
                    <option value="MPC500" {{if eq .Session.Profile.Name "MPC500"}}selected{{end}}>MPC500</option>
                </select>
            </form>
        </div>
    </header>

    <main class="editor-layout">
        <section class="pad-section">
            <div class="bank-tabs">
                {{range .Banks}}
                <button class="bank-tab {{if eq . $.Bank}}active{{end}}"
                        hx-get="/partials/pad-grid?bank={{.}}"
                        hx-target="#pad-grid">
                    Bank {{padBankLabel .}}
                </button>
                {{end}}
            </div>
            <div id="pad-grid">
                {{template "pad_grid.html" .PadGrid}}
            </div>
        </section>

        <section class="params-section" id="pad-params">
            {{template "pad_params.html" .PadParams}}
        </section>
    </main>

    <script src="/static/js/audio.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
