<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPC Editor</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
    <header class="app-header">
        <div class="header-top">
            <h1><span class="title-mpc">MPC</span> <span class="title-editor">Editor</span></h1>
            <nav class="toolbar">
                <button hx-post="/program/new" hx-confirm="Create new program? Unsaved changes will be lost." hx-target="#detail-panel">New</button>
                <input type="hidden" id="open-pgm-path" value="{{.Session.Prefs.LastPGMPath}}">
                <input type="hidden" id="save-pgm-path" value="{{.Session.FilePath}}">
                <button onclick="openSaveConfirm()">Save</button>
                <a href="/slicer" class="toolbar-link">Slicer</a>
                <a href="/batch" class="toolbar-link">Batch</a>
                <span class="toolbar-separator">|</span>
                <span class="toolbar-label">Profile:</span>
                <form hx-post="/edit/profile" class="inline-form">
                    <select name="profile" hx-trigger="change" hx-post="/edit/profile">
                        <option value="MPC1000" {{if eq .Session.Profile.Name "MPC1000"}}selected{{end}}>MPC1000</option>
                        <option value="MPC500" {{if eq .Session.Profile.Name "MPC500"}}selected{{end}}>MPC500</option>
                    </select>
                </form>
            </nav>
        </div>
        <div class="file-info">
            {{if .Session.FilePath}}{{.Session.FilePath}} | {{end}}Workspace: {{.Session.WorkspacePath}}
        </div>
    </header>

    <main class="browser-layout">
        <aside class="browser-panel">
            <div class="browser-panel-header">Workspace</div>
            <div id="file-nav">
                {{template "file_browser_nav.html" .BrowseData}}
            </div>
        </aside>

        <section class="detail-panel" id="detail-panel">
            {{if .DetailHTML}}
            {{.DetailHTML}}
            {{else}}
            {{template "detail_empty.html" .}}
            {{end}}
        </section>
    </main>

    <script src="/static/js/audio.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
